icons_format = "{icon}"

[theme]
theme = "slick"
#[theme.overrides]
#idle_bg = "#123456"
#idle_fg = "#abcdef"

[icons]
icons = "awesome4"
#[icons.overrides]
#bat = ["|E|", "|_|", "|=|", "|F|"]
#bat_charging = "|^| "

[[block]]
block = "battery"
format = " $icon $percentage "
charging_format = " $icon $percentage "
full_format = " $icon $percentage "
empty_format = " $icon $percentage "
not_charging_format = " $icon $percentage "
interval = 1

[[block]]
block = "cpu"
info_cpu = 20
warning_cpu = 50
critical_cpu = 90

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "pomodoro"
notify_cmd = "swaynag -m '{msg}'"
blocking_cmd = true

[[block]]
block = "sound"

[[block.click]]
button = "left"
cmd = "i3-volume mute"

[[block.click]]
button = "right"
cmd = "pavucontrol"

[[block.click]]
button = "wheel_up"
cmd = "i3-volume up 10"

[[block.click]]
button = "wheel_down"
cmd = "i3-volume down 10"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "
